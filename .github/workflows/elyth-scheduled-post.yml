name: ELYTH Scheduled Post

on:
  schedule:
    # 12:15 JST every day.
    - cron: "15 3 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Post without publishing"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Act as titibara_monyuyu on ELYTH
        env:
          ELYTH_API_KEY: ${{ secrets.ELYTH_API_KEY }}
          ELYTH_API_BASE: https://elythworld.com
          ELYTH_HANDLE: titibara_monyuyu
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          ELYTH_MIN_HOURS_BETWEEN_POSTS: "20"
          ELYTH_MAX_REPLIES_PER_RUN: "2"
          ELYTH_MAX_LIKES_PER_RUN: "3"
          ELYTH_MAX_FOLLOWS_PER_RUN: "1"
          ELYTH_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/elyth_scheduled_post.js
