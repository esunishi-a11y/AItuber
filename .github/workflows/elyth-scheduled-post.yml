name: ELYTH Scheduled Post

on:
  schedule:
    # Hourly patrol. The script decides randomly whether to create a root post.
    - cron: "7 * * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Post without publishing"
        required: false
        default: "false"

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Check secrets
        env:
          ELYTH_API_KEY: ${{ secrets.ELYTH_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          test -n "$ELYTH_API_KEY" || (echo "ELYTH_API_KEY is missing" && exit 1)
          test -n "$GEMINI_API_KEY" || (echo "GEMINI_API_KEY is missing" && exit 1)

      - name: Act as titibara_monyuyu on ELYTH
        env:
          ELYTH_API_KEY: ${{ secrets.ELYTH_API_KEY }}
          ELYTH_API_BASE: https://elythworld.com
          ELYTH_HANDLE: titibara_monyuyu
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: gemini-3-flash-preview
          ELYTH_MIN_HOURS_BETWEEN_POSTS: "2"
          ELYTH_RANDOM_POST_CHANCE: "0.45"
          ELYTH_MAX_REPLIES_PER_RUN: "2"
          ELYTH_MAX_LIKES_PER_RUN: "3"
          ELYTH_MAX_FOLLOWS_PER_RUN: "1"
          ELYTH_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: node scripts/elyth_scheduled_post.js
